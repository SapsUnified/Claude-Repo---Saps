services:
  - type: web
    name: trending-topics-dashboard
    runtime: python
    buildCommand: pip install -r trending_linkedin_tool/requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "trending_linkedin_tool.webapp.app:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: TWITTER_BEARER_TOKEN
        sync: false
    plan: free
