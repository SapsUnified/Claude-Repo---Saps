name: Weekly Trending Topics

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: trending_linkedin_tool/requirements.txt

      - name: Install dependencies
        run: pip install -r trending_linkedin_tool/requirements.txt

      - name: Run trending topics pipeline
        run: python -m trending_linkedin_tool --output-dir output

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-trending-report-${{ github.run_number }}
          path: output/
          retention-days: 90

      - name: Commit results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: weekly trending topics report $(date +%Y-%m-%d)"
          git push
